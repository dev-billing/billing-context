name: 🔧 Setup Service Triggers (One-time)

on:
  workflow_dispatch:
    inputs:
      repo-name:
        description: '특정 레포만 설정 (빈값이면 repos.json 전체)'
        required: false
        default: ''

jobs:
  setup:
    runs-on:
      group: billing-dev

    steps:
      - name: 🔑 Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CODE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CODE_REVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: 📥 Checkout billing-context
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🔧 Add trigger workflows to service repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_REPO: ${{ inputs.repo-name }}
        run: |
          SERVER=$(echo "$GITHUB_SERVER_URL" | sed 's|https://||')
          ORG=$(jq -r '.org' repos.json)
          REPOS=$(jq -r '.repos[].name' repos.json)
          if [ -n "$INPUT_REPO" ]; then
            REPOS="$INPUT_REPO"
          fi

          WORKFLOW_CONTENT="name: Sync AI Context

on:
  push:
    branches: [develop]

jobs:
  sync:
    uses: dev-billing/shared-workflows/.github/workflows/sync-ai-context.yml@main
    with:
      repo-name: REPO_NAME_PLACEHOLDER
    secrets: inherit"

          for REPO in $REPOS; do
            echo "=== $REPO ==="
            CLONE_DIR="/tmp/trigger-setup-$REPO"
            rm -rf "$CLONE_DIR"

            git clone --depth=1 \
              "https://x-access-token:${GH_TOKEN}@${SERVER}/${ORG}/${REPO}.git" \
              "$CLONE_DIR" || { echo "❌ $REPO 클론 실패"; continue; }

            mkdir -p "$CLONE_DIR/.github/workflows"
            echo "$WORKFLOW_CONTENT" \
              | sed "s|REPO_NAME_PLACEHOLDER|\${{ github.event.repository.name }}|" \
              > "$CLONE_DIR/.github/workflows/sync-ai-context.yml"

            git -C "$CLONE_DIR" config user.name "github-actions[bot]"
            git -C "$CLONE_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "$CLONE_DIR" add .github/workflows/sync-ai-context.yml

            if git -C "$CLONE_DIR" diff --staged --quiet; then
              echo "↩️  $REPO 변경 없음 — 스킵"
            else
              git -C "$CLONE_DIR" commit -m "chore: ai-context 자동 동기화 트리거 추가" \
                && git -C "$CLONE_DIR" push \
                && echo "✅ $REPO 완료" || echo "❌ $REPO push 실패"
            fi

            rm -rf "$CLONE_DIR"
          done
