name: Sync AI Context

on:
  schedule:
    - cron: '0 * * * *'  # 매 시간 실행
  workflow_dispatch:
    inputs:
      repo-name:
        description: '특정 레포만 업데이트 (빈값이면 변경된 전체 레포)'
        required: false
        default: ''
      force:
        description: '변경 여부 무시하고 강제 전체 재생성'
        type: boolean
        default: false

jobs:
  sync:
    uses: dev-billing/shared-workflows/.github/workflows/sync-ai-context.yml@main
    with:
      repo-name: ${{ inputs.repo-name || '' }}
      force: ${{ inputs.force || false }}
    secrets:
      AI_CONTEXT_TOKEN: ${{ secrets.AI_CONTEXT_TOKEN }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
